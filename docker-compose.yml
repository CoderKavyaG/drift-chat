version: '3.8'
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  coturn:
    image: coturn/coturn:latest
    network_mode: host
    environment:
      - DETECT_EXTERNAL_IP=yes
      - TURN_USERNAME=driftuser
      - TURN_PASSWORD=driftpass123
    command: >
      turnserver
      --realm=drift.local
      --user=driftuser:driftpass123
      --lt-cred-mech
      --fingerprint
      --no-multicast-peers
      --no-cli
      --log-file=stdout
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "5349:5349/tcp"
      - "5349:5349/udp"

volumes:
  redis_data:
